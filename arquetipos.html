    /* =========================================================
       SISTEMA VISUAL
       Referencia: plantilla "Personal Portfolio" (Andressa Belém,
       Figma Community, CC BY 4.0) — amarillo mostaza como acento
       único, formas orgánicas, serif de alto contraste + sans
       geométrica, mucho aire y sombras difusas.
       ========================================================= */
    :root{

      --yellow-soft: #FDF3D9;   /* fondo suave del acento */

    /* Tipografía: Poppins Light para el cuerpo, Playfair para titulares */
    body { font-family: "Poppins", ui-sans-serif, system-ui, sans-serif; font-weight: 300; line-height: 1.7; }
    h1, h2, h3, .font-serif { font-family: "Playfair Display", Georgia, serif; line-height: 1.15; }
    h1, h2 { letter-spacing: -0.01em; }
    /* En pantallas grandes (proyección en clase), sube la base tipográfica */
    @media (min-width: 1024px) { html { font-size: 17px; } }

    /* ===== Contraste: sobre amarillo el texto SIEMPRE va oscuro =====
       (blanco sobre #F4C245 da ~1.7:1 → incumple WCAG AA;
        #2B2B2B sobre #F4C245 da ~9.6:1 → cumple AAA) */
    .bg-indigo-600, .bg-indigo-500, .bg-indigo-700,
    .bg-indigo-600 *, .bg-indigo-500 *, .bg-indigo-700 * { color: var(--ink) !important; }

    /* ===== Formas más redondeadas y sombras difusas ===== */
    .rounded-xl  { border-radius: 14px !important; }
    .rounded-2xl { border-radius: 20px !important; }
    .rounded-3xl { border-radius: 26px !important; }
    .shadow-sm { box-shadow: 0 4px 18px -10px rgba(30,30,40,.16) !important; }
    .shadow-md { box-shadow: 0 12px 30px -16px rgba(30,30,40,.22) !important; }
    .shadow-lg { box-shadow: 0 20px 46px -22px rgba(30,30,40,.26) !important; }
    .shadow-xl { box-shadow: 0 30px 66px -28px rgba(30,30,40,.32) !important; }

    /* ===== Botones: elevación al pasar el mouse (como la referencia) ===== */
    button:not(:disabled) { transition: transform .22s ease, box-shadow .22s ease, background-color .22s ease, border-color .22s ease; }
    button.bg-indigo-600:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 12px 26px -10px rgba(244,194,69,.85) !important; }

    /* ===== Campos de formulario ===== */
    input, textarea, select { font-family: "Poppins", sans-serif; font-weight: 300; }
    input::placeholder, textarea::placeholder { color: #B9B9C0; }

    /* ===== "Eyebrow": etiqueta pequeña en mayúsculas sobre los títulos ===== */
    .eyebrow{
      font-family: "Poppins", sans-serif; font-weight: 600; font-size: 13px;
      letter-spacing: .09em; text-transform: uppercase; color: var(--amber-text);
    }

    /* ===== Blob orgánico decorativo del hero ===== */
    .hero-shell{ position:relative; }
    .hero-shell > *:not(.blob-deco){ position:relative; z-index:1; }
    .blob-deco{ position:absolute !important; z-index:0; pointer-events:none; }

    /* ===== Máscara orgánica para las imágenes de arquetipo =====
       border-radius asimétrico → forma de "blob" sin depender de SVG.
       Funciona igual con foto (.jpg/.png) que con ilustración (.svg). */
    .arch-blob{
      border-radius: 58% 42% 47% 53% / 45% 40% 60% 55% !important;
      object-fit: cover;
      overflow: hidden;
      transition: border-radius .8s ease, transform .4s ease;
    }
    .arch-blob:hover{
      border-radius: 44% 56% 60% 40% / 55% 52% 48% 45% !important;
      transform: scale(1.04);
    }

    /* ===== Animaciones lúdicas ===== */
    /* Punto de la marca en el mapa: se mueve suave al responder */
    .brand-dot { transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Carta coleccionable con flip 3D */
    .card-scene { perspective: 1200px; }
    .card-flip { position: relative; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-flip.flipped { transform: rotateY(180deg); }
    .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-back { position: absolute; inset: 0; transform: rotateY(180deg); }

    /* Suspenso: aparición escalonada */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.6s ease-out both; }
    @keyframes pulseSoft { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .pulse-soft { animation: pulseSoft 1.2s ease-in-out infinite; }

    /* Easter eggs: partículas temáticas que caen */
    @keyframes particleFall {
      0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
    .particle { position: fixed; top: 0; z-index: 60; pointer-events: none; animation: particleFall linear forwards; }

    /* Brillo del cuadrante activo en el mapa */
    .quad-glow { transition: opacity 0.7s ease; }

    /* ArchImage
       · Busca img/<id> en .svg → .png → .jpg → .webp (así puedes usar
         fotografía sin renombrar nada) y cae a la ilustración embebida.
       · `blob`: recorta la imagen en forma orgánica (estilo de la app).
         Se desactiva en la carta y en los exportables, donde conviene
         una forma estable. */
    function ArchImage({ id, className, style, blob = true }) {
      const [i, setI] = useState(0);
      /* .jpg primero porque es el formato del set actual: evita 24
         peticiones fallidas al cargar. Los otros siguen funcionando. */
      const cands = [
        "img/" + id + ".jpg", "img/" + id + ".webp",
        "img/" + id + ".png", "img/" + id + ".svg",
      ];
      const cls = (className || "") + (blob ? " arch-blob" : "");
      if (i < cands.length) {
        return (
          <img
            src={cands[i]}
            alt={"Arquetipo " + id}
            className={cls}
            style={style}
            onError={() => setI(i + 1)}
          />
        );
      }
      return (
        <div
          className={cls}
          style={style}
          dangerouslySetInnerHTML={{ __html: archArt(id) }}
        />
      );
    }

    /* Archienemigo: el arquetipo más lejano en el mapa de ejes
       (el opuesto motivacional según Mark & Pearson) */
    function nemesisOf(arch) {
      let best = null, bestD = -1;
      ARCHETYPES.forEach((a) => {
        if (a.id === arch.id) return;
        const d = Math.hypot(a.ejes.pertenencia - arch.ejes.pertenencia, a.ejes.estabilidad - arch.ejes.estabilidad);
        if (d > bestD) { bestD = d; best = a; }
      });
      return best;
    }

       1. Acumula pesos de las preguntas "ejes" en 2 acumuladores.
       2. Normaliza cada eje a −100..+100 (máx 5 preguntas × ±2 = ±10).
       3. Cuadrante ganador = polo dominante (mayor |acumulado|).
       4. Ranking: cercanía de la marca a cada arquetipo en el mapa
          (escala −2..+2) + puntos directos de las preguntas de
          desempate (tipo "directa"), con peso 2.
       Primario = 1º del ranking; secundario = 2º.
       --------------------------------------------------------- */
    function scoring(answers) {
      let p = 0, e = 0;
      const direct = {};
      QUESTIONS.forEach((q, i) => {
        const op = q.opciones[answers[i]];
        if (!op) return;
        if (q.tipo === "ejes") {
          p += op.pesos.pertenencia;
          e += op.pesos.estabilidad;
        } else {
          Object.entries(op.arquetipos || {}).forEach(([id, pts]) => {
            direct[id] = (direct[id] || 0) + pts;
          });
        }
      });

      const MAX_AXIS = 10; // 5 preguntas × peso máximo 2 por eje
      const axisBelonging = Math.round((p / MAX_AXIS) * 100); // + Pertenencia / − Independencia
      const axisStability = Math.round((e / MAX_AXIS) * 100); // + Estabilidad / − Riesgo

      /* Posición de la marca en el mapa (−2..+2) */
      const bx = (p / MAX_AXIS) * 2;
      const by = (e / MAX_AXIS) * 2;
      const MAX_DIST = Math.sqrt(32); // diagonal del plano 4×4

      const ranking = ARCHETYPES.map((a) => {
        const d = Math.hypot(bx - a.ejes.pertenencia, by - a.ejes.estabilidad);
        const proximidad = ((MAX_DIST - d) / MAX_DIST) * 10; // 0..10
        const directo = (direct[a.id] || 0) * 2;             // desempate (Doc 2 §6.5)
        return { id: a.id, score: Math.round((proximidad + directo) * 10) / 10 };
      }).sort((x, y) => y.score - x.score);

      /* Cuadrante ganador = cuadrante del arquetipo primario
         (consistente con el ranking; evita ambigüedad en empates de ejes) */
      const quadrant = ARCHETYPES.find((a) => a.id === ranking[0].id).cuadrante;

      return { axisBelonging, axisStability, bx, by, quadrant, ranking };
    }

    function StepTest({ answers, onAnswer, brandName }) {

        : Math.abs(p) >= Math.abs(e)

                  onClick={() => setQIdx(qIdx + 1)}

                  className="px-5 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:ring-4 focus:ring-indigo-300"
                >
                  Siguiente pregunta →
                </button>
              ) : allDone ? (
                <span className="text-emerald-600 font-medium">✓ Test completo — presiona "Ver mi resultado"</span>
              ) : (
                <span className="text-sm text-slate-400">Responde para terminar</span>
              )}
            </div>
          </div>
          {/* ===== Mapa en vivo: la marca se mueve al responder ===== */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mt-5">
            <div className="flex items-center justify-between">
              <h3 className="font-semibold text-slate-900 text-sm">
                🧭 {brandName || "Tu marca"} en el mapa — en vivo
              </h3>
              <span className="text-xs text-slate-400">
                {axisAnswered === 0 ? "Responde para verla moverse" : "Se actualiza con cada respuesta"}
              </span>
            </div>
            <div className="mt-2">
              <AxesDiagram pole={pole}>
                {axisAnswered > 0 && (
                  <g className="brand-dot" style={{ transform: "translate(" + dotX + "px, " + dotY + "px)" }}>
                    <circle r="14" fill="#6366f1" opacity="0.25">
                      <animate attributeName="r" values="10;16;10" dur="2s" repeatCount="indefinite" />
                    </circle>
                    <circle r="8" fill="#4f46e5" stroke="#ffffff" strokeWidth="2.5" />
                  </g>
                )}
              </AxesDiagram>
            </div>
          </div>
          {!allDone && (
            <p className="mt-3 text-sm text-slate-400 text-center">
              Debes responder las {total} preguntas para ver tu resultado.
            </p>
          )}
        </StepShell>
      );
    }

    /* Bloque etiqueta+valor de la ficha */
    function InfoBlock({ label, children }) {
      return (
        <div className="bg-slate-50 rounded-xl p-4">
          <p className="text-xs font-semibold uppercase tracking-wide text-slate-500">{label}</p>
          <div className="mt-1 text-slate-800">{children}</div>
        </div>
      );
    }

    function StepResult({ scores, result, brandName, onRedo, revealed, onRevealed }) {
      /* Fases del reveal: "suspense" → "revealed" (carta + ficha) */
      const [phase, setPhase] = useState(revealed ? "revealed" : "suspense");
      const [flipped, setFlipped] = useState(revealed);

      const prim = scores && result.primary ? ARCHETYPES.find((a) => a.id === result.primary) : null;
      const sec = scores && result.secondary ? ARCHETYPES.find((a) => a.id === result.secondary) : null;

      /* Flip de la carta + lluvia temática al revelar */
      useEffect(() => {
        if (phase === "revealed" && !flipped) {
          const t1 = setTimeout(() => setFlipped(true), 350);
          const t2 = setTimeout(() => themedBurst(prim.id, prim.color), 1100);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }
      }, [phase]);

      if (!scores || !result.primary) {
        return (
          <StepShell title="Tu arquetipo" subtitle="Primero completa el test.">
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-slate-400 text-center">
              Vuelve al paso anterior y responde las {QUESTIONS.length} preguntas.
            </div>
          </StepShell>
        );
      }
      const nem = nemesisOf(prim);
      /* posición de la marca en el SVG: Pertenencia → izquierda, Estabilidad → arriba */
      const cx = 230 - scores.bx * 80;
      const cy = 150 - scores.by * 52;
      /* Distribución primario/secundario entre los 2 dominantes */
      const s1 = Math.max(scores.ranking[0].score, 0.1), s2 = Math.max(scores.ranking[1].score, 0);
      const pct1 = Math.round((s1 / (s1 + s2)) * 100), pct2 = 100 - pct1;
      const cardIdx = ARCHETYPES.findIndex((a) => a.id === prim.id) + 1;

      /* ===== Fase 1: suspenso ===== */
      if (phase === "suspense") {
        return (
          <StepShell title="🔮 Analizando tu marca…" subtitle={brandName ? "Leyendo las respuestas de " + brandName : undefined}>
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center space-y-5 max-w-xl mx-auto">
              <p className="fade-up text-lg text-slate-700" style={{ animationDelay: "0.2s" }}>
                Tu marca vive en el territorio <strong>“{prim.cuadrante}”</strong>…
              </p>
              <p className="fade-up text-lg text-slate-700" style={{ animationDelay: "1.1s" }}>
                …el mismo barrio de marcas como <strong>{prim.marcaReferencia}</strong> y <strong>{sec.marcaReferencia}</strong>…
              </p>
              <p className="fade-up text-lg text-slate-700" style={{ animationDelay: "2s" }}>
                …y su deseo más profundo es la <strong>{prim.deseoCentral.toLowerCase()}</strong>. 👀
              </p>
              <div className="fade-up pt-2" style={{ animationDelay: "2.9s" }}>
                <button
                  onClick={() => { setPhase("revealed"); onRevealed && onRevealed(); }}
                  className="px-8 py-4 rounded-2xl bg-indigo-600 text-white text-lg font-bold shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                >
                  🎴 Revelar mi arquetipo
                </button>
              </div>
            </div>
          </StepShell>
        );
      }

      /* ===== Fase 2: carta + ficha completa ===== */
      return (
        <StepShell
          eyebrow="Paso 4 · Tu resultado"
          title={brandName ? "El arquetipo de " + brandName : "Tu arquetipo"}
          subtitle="Un punto de partida para tu personalidad de marca — no un veredicto."
        >
          <div className="space-y-5">
            {/* ===== Carta coleccionable con flip ===== */}
            <div className="card-scene max-w-xs mx-auto" style={{ height: "420px" }}>
              <div className={"card-flip w-full h-full " + (flipped ? "flipped" : "")}>
                {/* Reverso (se ve primero) */}
                <div className="card-face card-back absolute inset-0 rounded-3xl shadow-xl border-4 border-white flex flex-col items-center justify-center text-white"
                     style={{ background: "linear-gradient(135deg, #2B2B2B, #45454E)", transform: "rotateY(0deg)" }}>
                  <span className="text-7xl" style={{ color: "#F4C245" }}>❓</span>
                  <p className="mt-4 font-medium tracking-widest uppercase text-sm opacity-70">Arquetipos de marca</p>
                </div>
                {/* Frente: la carta del arquetipo */}
                <div className="card-face absolute inset-0 rounded-3xl shadow-xl border-4 border-white overflow-hidden flex flex-col text-white"
                     style={{ backgroundColor: prim.color, transform: "rotateY(180deg)" }}>
                  <div className="flex justify-between items-center px-4 pt-3 text-xs uppercase tracking-widest opacity-90">
                    <span>Carta {cardIdx}/12</span>
                    <span>{prim.cuadrante}</span>
                  </div>
                  <div className="flex-1 flex flex-col items-center justify-center px-5 text-center">
                    <ArchImage id={prim.id} className="w-28 h-28 drop-shadow-lg" />
                    <h2 className="text-2xl font-extrabold mt-3 leading-tight px-1">{prim.nombre}</h2>
                    <p className="text-sm opacity-80">{prim.nombreEN}</p>
                    <p className="mt-3 italic opacity-95">“{prim.motto}”</p>
                  </div>
                  <div className="bg-black/25 px-5 py-4 text-sm space-y-1.5">
                    <p><strong>Deseo central:</strong> {prim.deseoCentral}</p>
                    <p><strong>Tono:</strong> {prim.tonoDeVoz.join(" · ")}</p>
                    <div className="flex items-center gap-2 pt-1">
                      <div className="flex-1 bg-white/25 rounded-full h-2">
                        <div className="bg-white h-2 rounded-full" style={{ width: pct1 + "%" }}></div>
                      </div>
                      <span className="text-xs font-bold">{pct1}%</span>
                    </div>
                    <p className="text-xs opacity-80">+ {pct2}% {sec.nombreBreve || sec.nombre} (secundario)</p>
                  </div>
                </div>
              </div>
            </div>
            {/* ===== Ficha PRIMARIO ===== */}
            <div className="rounded-2xl overflow-hidden shadow-md border border-slate-200 bg-white">
              <div className="relative p-6 sm:p-8 text-white" style={{ backgroundColor: prim.color }}>
                <ArchImage id={prim.id} className="hidden sm:block absolute top-5 right-5 w-24 h-24 rounded-2xl shadow-lg ring-2 ring-white/40" />
                <p className="text-xs sm:text-sm uppercase tracking-widest opacity-90">Arquetipo primario</p>
                <h2 className="text-3xl sm:text-4xl font-bold mt-1">
                  {prim.nombre} <span className="font-normal text-xl opacity-80">· {prim.nombreEN}</span>
                </h2>
                <p className="mt-2 italic text-lg opacity-95">“{prim.motto}”</p>
                <span className="inline-block mt-3 px-3 py-1 rounded-full bg-white/20 text-sm">
                  Cuadrante: {prim.cuadrante}
                </span>
              </div>
              <div className="p-6 sm:p-8 space-y-5">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <InfoBlock label="Deseo central">{prim.deseoCentral}</InfoBlock>
                  <InfoBlock label="Meta">{prim.meta}</InfoBlock>
                  <InfoBlock label="Mayor miedo">{prim.miedo}</InfoBlock>
                  <InfoBlock label="Estrategia">{prim.estrategia}</InfoBlock>
                </div>
                <InfoBlock label="Estrategia de branding">{prim.estrategiaBranding}</InfoBlock>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <InfoBlock label="Tono de voz">
                    <div className="flex flex-wrap gap-2 mt-1">
                      {prim.tonoDeVoz.map((t) => (
                        <span key={t} className="px-3 py-1 rounded-full text-sm text-white" style={{ backgroundColor: prim.color }}>
                          {t}
                        </span>
                      ))}
                    </div>
                    <p className="mt-2 italic text-slate-600">Ej.: “{prim.ejemploFrase}”</p>
                  </InfoBlock>
                  <InfoBlock label="Paleta de color sugerida">
                    <div className="flex gap-3 mt-1">
                      {prim.paletaColor.map((c) => (
                        <div key={c} className="text-center">
                          <div className="w-10 h-10 rounded-full border border-slate-200 shadow-sm" style={{ backgroundColor: c }} title={c}></div>
                          <span className="text-[10px] text-slate-500">{c}</span>
                        </div>
                      ))}
                    </div>
                  </InfoBlock>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <InfoBlock label="Industrias donde gana">
                    <ul className="list-disc list-inside text-sm space-y-0.5">
                      {prim.industrias.map((i) => <li key={i}>{i}</li>)}
                    </ul>
                  </InfoBlock>
                  <InfoBlock label="Marca de referencia">
                    <p className="font-semibold">{prim.marcaReferencia}</p>
                    <p className="text-xs text-slate-500 mt-1">Ejemplo ilustrativo (Iconic Fox); discutible en clase.</p>
                  </InfoBlock>
                </div>
                <div className="bg-rose-50 border border-rose-200 rounded-xl p-4">
                  <p className="text-xs font-semibold uppercase tracking-wide text-rose-600">Sombra / riesgo del arquetipo</p>
                  <p className="mt-1 text-rose-900">{prim.sombra}</p>
                </div>
              </div>
            </div>

            {/* ===== SECUNDARIO (resumido) ===== */}
            <div className="bg-white rounded-2xl shadow-sm border-2 p-6" style={{ borderColor: sec.color }}>
              <p className="text-xs uppercase tracking-widest text-slate-500">Arquetipo secundario</p>
              <h3 className="text-xl font-bold mt-1" style={{ color: sec.color }}>
                {sec.nombre} <span className="font-normal text-slate-400">· {sec.nombreEN}</span>
              </h3>
              <p className="mt-1 text-slate-600"><strong>Deseo central:</strong> {sec.deseoCentral} · <strong>Tono:</strong> {sec.tonoDeVoz.join(", ")}</p>
              <p className="mt-2 text-slate-600">
                Cómo complementa: tu marca es principalmente {prim.nombreBreve}, matizada por {sec.nombreBreve} —
                suma su búsqueda de {sec.deseoCentral.toLowerCase()} al núcleo de {prim.deseoCentral.toLowerCase()}.
                Las marcas reales rara vez son un arquetipo puro.
              </p>
            </div>

            {/* ===== Archienemigo: el opuesto en el mapa ===== */}
            <div className="bg-slate-900 rounded-2xl shadow-sm p-6 text-white">
              <p className="text-xs uppercase tracking-widest text-slate-400">⚔️ Tu archienemigo</p>
              <div className="flex items-center gap-3 mt-1">
                <ArchImage id={nem.id} className="w-12 h-12 rounded-xl shadow-md shrink-0 ring-1 ring-white/20" />
                <h3 className="text-xl font-bold">
                  {nem.nombre} <span className="font-normal text-slate-400">· {nem.nombreEN}</span>
                </h3>
              </div>
              <p className="mt-2 text-slate-300">
                Es el arquetipo más lejano al tuyo en el mapa de motivaciones de Mark & Pearson:
                donde {prim.nombreBreve} busca {prim.deseoCentral.toLowerCase()}, {nem.nombreBreve} busca {nem.deseoCentral.toLowerCase()}.
                No es una marca "mala" — es una personalidad que tu marca <strong>no debería imitar</strong>:
                si mezclas ambos tonos, tu comunicación pierde coherencia.
              </p>
              <p className="mt-2 text-slate-400 text-sm">
                Piensa en {nem.marcaReferencia}: excelente marca… con una personalidad opuesta a la tuya.
              </p>
            </div>

            {/* ===== Gráfico de posición en los 2 ejes (HU-10) ===== */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
              <h3 className="font-semibold text-slate-900">¿Por qué este resultado?</h3>
              <p className="text-sm text-slate-500 mt-1">
                Posición de {brandName || "tu marca"} en los dos ejes de Mark & Pearson:
                Pertenencia {scores.axisBelonging >= 0 ? "+" : ""}{scores.axisBelonging} ·
                Estabilidad {scores.axisStability >= 0 ? "+" : ""}{scores.axisStability} (escala −100..+100).
                Cuadrante dominante: <strong>{scores.quadrant}</strong>.
              </p>
              <div className="mt-3">
                <AxesDiagram>
                  <circle cx={cx} cy={cy} r="9" fill={prim.color} stroke="#ffffff" strokeWidth="3" />
                  <text x={cx} y={cy - 14} textAnchor="middle" fontSize="11" fontWeight="bold" fill={prim.color}>
                    {brandName || "Tu marca"}
                  </text>
                </AxesDiagram>
              </div>
            </div>

            <div className="text-center">
              <button
                onClick={onRedo}
                className="px-6 py-3 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-100 font-medium focus:outline-none focus:ring-4 focus:ring-slate-200"
              >
                ↺ Rehacer test
              </button>
            </div>
          </div>
        </StepShell>
      );
    }

    /* =========================================================
       Paso 4 — Constructor de voz + exportación (Doc 2 §3, HU-12..14)
       ========================================================= */
    const VOICE_FIELDS = [
      { key: "message1", label: "Mensaje / claim 1", placeholder: "Ej.: un beneficio central de tu marca, dicho en el tono del arquetipo." },
      { key: "message2", label: "Mensaje / claim 2", placeholder: "Ej.: qué te diferencia de la competencia." },
      { key: "message3", label: "Mensaje / claim 3", placeholder: "Ej.: una llamada a la acción para tu cliente." },
    ];
    const COMPANY_LABELS = {
      queHace: "Qué hace", paraQuien: "A quién le vende",
      diferencia: "Qué la hace distinta", percepcion: "Cómo quiere ser percibida",
    };

    function StepVoice({ voice, onChange, result, scores, brandName, company, onRestart }) {
      const [busy, setBusy] = useState(false);
      if (!scores || !result.primary) {
        return (
          <StepShell title="Tu voz de marca" subtitle="Primero completa el test.">
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-slate-400 text-center">
              Vuelve al test y responde las {QUESTIONS.length} preguntas para desbloquear este paso.
            </div>
          </StepShell>
        );
      }
      const prim = ARCHETYPES.find((a) => a.id === result.primary);
      const sec = ARCHETYPES.find((a) => a.id === result.secondary);
      const empresaLlena = Object.entries(company).filter(([k, v]) => v && v.trim());
      const fileBase = (brandName || "mi-marca").toLowerCase().replace(/[^a-z0-9áéíóúñü]+/gi, "-");
      /* Distribución primario/secundario (misma fórmula del resultado) */
      const s1 = Math.max(scores.ranking[0].score, 0.1), s2 = Math.max(scores.ranking[1].score, 0);
      const pct1 = Math.round((s1 / (s1 + s2)) * 100), pct2 = 100 - pct1;

      /* --- Exportación (HU-13) --- */
      const renderCanvas = () =>
        html2canvas(document.getElementById("export-card"), { scale: 2, backgroundColor: "#ffffff", useCORS: true });

      const exportStory = async () => {
        setBusy(true);
        try {
          const canvas = await html2canvas(document.getElementById("story-card"), { scale: 3, useCORS: true });
          const a = document.createElement("a");
          a.download = fileBase + "-arquetipo-story.png";
          a.href = canvas.toDataURL("image/png");
          a.click();
        } finally { setBusy(false); }
      };

      const exportPNG = async () => {
        setBusy(true);
        try {
          const canvas = await renderCanvas();
          const a = document.createElement("a");
          a.download = fileBase + "-arquetipo.png";
          a.href = canvas.toDataURL("image/png");
          a.click();
        } finally { setBusy(false); }
      };

      const exportPDF = async () => {
        setBusy(true);
        try {
          const canvas = await renderCanvas();
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ unit: "mm", format: "a4" });
          const pw = 210, ph = 297, margin = 10;
          const iw = pw - 2 * margin;
          const pageHpx = ((ph - 2 * margin) * canvas.width) / iw; // alto de página en px del canvas
          let y = 0, page = 0;
          while (y < canvas.height) {
            const slice = document.createElement("canvas");
            slice.width = canvas.width;
            slice.height = Math.min(pageHpx, canvas.height - y);
            slice.getContext("2d").drawImage(canvas, 0, y, canvas.width, slice.height, 0, 0, canvas.width, slice.height);
            if (page > 0) pdf.addPage();
            pdf.addImage(slice.toDataURL("image/jpeg", 0.95), "JPEG", margin, margin, iw, (slice.height * iw) / canvas.width);
            y += pageHpx; page++;
          }
          pdf.save(fileBase + "-arquetipo.pdf");
        } finally { setBusy(false); }
      };

      return (
        <StepShell
          eyebrow="Paso 5 · Entregable"
          title="Tu voz de marca"
          subtitle={"Traduce el arquetipo " + prim.nombreBreve + " en mensajes propios y descarga tu entregable."}
        >
          <div className="space-y-5">
            {/* Guía de tono del arquetipo (HU-12) */}
            <div className="rounded-2xl border-2 p-6 bg-white" style={{ borderColor: prim.color }}>
              <p className="text-xs uppercase tracking-widest text-slate-500">Guía de tono — {prim.nombre}</p>
              <div className="flex flex-wrap gap-2 mt-2">
                {prim.tonoDeVoz.map((t) => (
                  <span key={t} className="px-3 py-1 rounded-full text-sm text-white" style={{ backgroundColor: prim.color }}>{t}</span>
                ))}
              </div>
              <p className="mt-2 text-slate-600 text-sm">{prim.estrategiaBranding}</p>
              <p className="mt-1 italic text-slate-600 text-sm">Frase de ejemplo: “{prim.ejemploFrase}”</p>
            </div>

            {/* Campos de redacción */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
              {VOICE_FIELDS.map((f) => (
                <div key={f.key}>
                  <label htmlFor={"voice-" + f.key} className="font-semibold text-slate-900 block">{f.label}</label>
                  <textarea
                    id={"voice-" + f.key}
                    value={voice[f.key]}
                    onChange={(e) => onChange(f.key, e.target.value)}
                    placeholder={f.placeholder}
                    rows={2}
                    className="mt-1 w-full px-3 py-2 rounded-xl border border-slate-300 focus:outline-none focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500 text-sm resize-y"
                  ></textarea>
                </div>
              ))}
              <div>
                <label htmlFor="voice-tagline" className="font-semibold text-slate-900 block">Tagline</label>
                <input
                  id="voice-tagline"
                  type="text"
                  value={voice.tagline}
                  onChange={(e) => onChange("tagline", e.target.value)}
                  placeholder={"Ej.: una frase corta y memorable, estilo “" + prim.ejemploFrase + "”"}
                  className="mt-1 w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500 text-lg"
                />
              </div>
            </div>

            {/* Vista previa del entregable (lo que se exporta) */}
            <div>
              <h3 className="font-semibold text-slate-900 mb-2">Vista previa del entregable</h3>
              <div id="export-card" className="bg-white rounded-2xl border border-slate-200 overflow-hidden max-w-2xl mx-auto">
                <div className="p-6 text-white" style={{ backgroundColor: prim.color }}>
                  <p className="text-xs uppercase tracking-widest opacity-90">Arquetipo de marca</p>
                  <h2 className="text-2xl font-bold mt-1">{brandName || "Mi marca"}</h2>
                  <p className="mt-1 text-lg">
                    <strong>{prim.nombreBreve}</strong> ({prim.nombreEN}) + secundario: {sec.nombreBreve}
                  </p>
                  <p className="italic opacity-95 mt-1">“{prim.motto}”</p>
                </div>
                <div className="p-6 space-y-4 text-sm">
                  <div>
                    <p className="font-bold text-slate-900 uppercase text-xs tracking-wide">Arquetipo primario — {prim.nombre}</p>
                    <p className="text-slate-700 mt-1">
                      <strong>Deseo:</strong> {prim.deseoCentral} · <strong>Cuadrante:</strong> {prim.cuadrante} ·
                      <strong> Tono:</strong> {prim.tonoDeVoz.join(", ")}
                    </p>
                    <p className="text-slate-700 mt-1">{prim.estrategiaBranding}</p>
                    <p className="text-slate-500 mt-1">
                      Posición en ejes: Pertenencia {scores.axisBelonging >= 0 ? "+" : ""}{scores.axisBelonging} ·
                      Estabilidad {scores.axisStability >= 0 ? "+" : ""}{scores.axisStability}
                    </p>
                  </div>
                  <div>
                    <p className="font-bold text-slate-900 uppercase text-xs tracking-wide">Arquetipo secundario — {sec.nombre}</p>
                    <p className="text-slate-700 mt-1"><strong>Deseo:</strong> {sec.deseoCentral} · <strong>Tono:</strong> {sec.tonoDeVoz.join(", ")}</p>
                  </div>
                  <div>
                    <p className="font-bold text-slate-900 uppercase text-xs tracking-wide">Sobre la empresa</p>
                    {empresaLlena.length > 0 ? (
                      <ul className="mt-1 space-y-0.5 text-slate-700">
                        {empresaLlena.map(([k, v]) => (
                          <li key={k}><strong>{COMPANY_LABELS[k]}:</strong> {v}</li>
                        ))}
                      </ul>
                    ) : (
                      <p className="text-slate-400 mt-1">(No completado)</p>
                    )}
                  </div>
                  <div>
                    <p className="font-bold text-slate-900 uppercase text-xs tracking-wide">Mensajes en la voz de la marca</p>
                    <ol className="mt-1 list-decimal list-inside space-y-0.5 text-slate-700">
                      {[voice.message1, voice.message2, voice.message3].map((m, i) => (
                        <li key={i}>{m || <span className="text-slate-400">(vacío)</span>}</li>
                      ))}
                    </ol>
                    <p className="mt-2 text-lg font-semibold" style={{ color: prim.color }}>
                      {voice.tagline || "(sin tagline)"}
                    </p>
                  </div>
                  <div className="pt-3 border-t border-slate-200 text-[10px] text-slate-500">
                    Fuentes: Mark, M. & Pearson, C. S. (2001). <em>The Hero and the Outlaw</em>. McGraw-Hill (ejes pp. 14–15; motto
                    verificado) · Iconic Fox, <em>Brand Archetypes: The Definitive Guide</em> (iconicfox.com.au/brand-archetypes).
                    Generado con el asistente de arquetipos del curso.
                  </div>
                </div>
              </div>
            </div>

            {/* ===== Story para redes (se exporta desde un lienzo oculto) ===== */}
            <div style={{ position: "absolute", left: "-9999px", top: 0 }} aria-hidden="true">
              <div id="story-card"
                   style={{ width: "405px", height: "720px", background: "linear-gradient(160deg, " + prim.color + " 0%, #111827 130%)" }}
                   className="text-white flex flex-col justify-between p-8">
                <div>
                  <p className="text-xs uppercase tracking-widest opacity-80">Mi arquetipo de marca</p>
                  <div className="w-24 h-24 mt-4" dangerouslySetInnerHTML={{ __html: archArt(prim.id) }} />
                  <h2 className="text-3xl font-extrabold mt-3">{brandName || "Mi marca"}</h2>
                  <p className="text-xl mt-1 font-semibold opacity-95">es {prim.nombreBreve}</p>
                  <p className="italic mt-3 opacity-90">“{prim.motto}”</p>
                </div>
                <div className="space-y-3">
                  <div>
                    <div className="flex justify-between text-sm font-semibold"><span>{prim.nombreBreve || prim.nombre}</span><span>{pct1}%</span></div>
                    <div className="bg-white/25 rounded-full h-2.5 mt-1"><div className="bg-white h-2.5 rounded-full" style={{ width: pct1 + "%" }}></div></div>
                  </div>
                  <div>
                    <div className="flex justify-between text-sm opacity-90"><span>{sec.nombreBreve || sec.nombre}</span><span>{pct2}%</span></div>
                    <div className="bg-white/25 rounded-full h-2.5 mt-1"><div className="bg-white/70 h-2.5 rounded-full" style={{ width: pct2 + "%" }}></div></div>
                  </div>
                  <p className="text-sm pt-1"><strong>Deseo central:</strong> {prim.deseoCentral} · <strong>Tono:</strong> {prim.tonoDeVoz.join(", ")}</p>
                  <div className="flex gap-2 pt-1">
                    {prim.paletaColor.map((c) => (
                      <div key={c} className="w-8 h-8 rounded-full border-2 border-white/60" style={{ backgroundColor: c }}></div>
                    ))}
                  </div>
                  <p className="text-[10px] opacity-70 pt-2">Basado en Mark & Pearson (2001), The Hero and the Outlaw · Test de arquetipos del curso</p>
                </div>
              </div>
            </div>

            {/* Acciones */}
            <div className="flex flex-wrap justify-center gap-3">
              <button
                onClick={exportPNG}
                disabled={busy}
                className="px-6 py-3 rounded-xl bg-indigo-600 text-white font-semibold shadow-md hover:bg-indigo-700 disabled:opacity-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                ⬇ Descargar PNG
              </button>
              <button
                onClick={exportPDF}
                disabled={busy}
                className="px-6 py-3 rounded-xl bg-indigo-600 text-white font-semibold shadow-md hover:bg-indigo-700 disabled:opacity-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
              >
                ⬇ Descargar PDF
              </button>
              <button
                onClick={exportStory}
                disabled={busy}
                className="px-6 py-3 rounded-xl text-white font-semibold shadow-md disabled:opacity-50 focus:outline-none focus:ring-4 focus:ring-indigo-300"
                style={{ background: "linear-gradient(135deg, " + prim.color + ", #111827)" }}
              >
                📲 Story para redes
              </button>
              <button
                onClick={onRestart}
                className="px-6 py-3 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-100 font-medium focus:outline-none focus:ring-4 focus:ring-slate-200"
              >
                ↺ Empezar de nuevo
              </button>
            </div>
            {busy && <p className="text-center text-sm text-slate-400">Generando archivo…</p>}

            {/* ---- Limitaciones de esta mirada (cierre crítico) ---- */}
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mt-8">
              <p className="eyebrow" style={{ color: "#C25A4E" }}>Antes de irte</p>
              <h2 className="font-serif text-2xl font-bold text-slate-900 mt-1">
                Las limitaciones de esta mirada
              </h2>
              <p className="mt-2 text-slate-600 text-sm">
                Ya tienes tu resultado. Ahora la parte incómoda: un arquetipo es una herramienta útil,
                no una verdad. Estas son las cosas que esta app <em>no</em> puede hacer.
              </p>

              <div className="mt-5 space-y-4">
                {[
                  ["Un test siempre simplifica",
                   "Catorce preguntas no capturan la complejidad de una marca. Tu resultado es una hipótesis de trabajo, no un veredicto. Por eso ves un primario y un secundario, y por eso puedes rehacerlo."],
                  ["El modelo no está validado empíricamente",
                   "Los arquetipos son un marco interpretativo, no un constructo psicométrico. No hay evidencia sólida de que las marcas \"tengan\" arquetipos de forma medible, ni de que uno cause mejores resultados de negocio. Su valor es organizar decisiones de comunicación."],
                  ["Sesgo de deseabilidad",
                   "Tendemos a inclinarnos hacia arquetipos atractivos —Héroe, Mago, Creador— y a evitar los que suenan menos glamorosos, aunque describan mejor a la marca. Las preguntas por escenarios lo mitigan, pero no lo eliminan."],
                  ["Las marcas de ejemplo son discutibles",
                   "Decir que Nike es Héroe o Google Sabio es una lectura, no un hecho. Una misma marca admite varias interpretaciones. Úsalas para discutir, no para zanjar."],
                  ["Las imágenes son generadas con IA, y traen su sesgo",
                   "Las doce ilustraciones se generaron con Gemini, con fines pedagógicos, para evitar problemas de derechos y de uso de imagen de personas reales. El hallazgo no estaba planificado: las primeras versiones no representaban a Chile —el modelo devolvía por defecto rostros, vestuario y escenarios del norte global— y hubo que pedir el contexto local de forma explícita. \"Por defecto\" no significa \"neutro\". La misma pregunta se le puede hacer a cualquier marca que use IA generativa: ¿a quién está mostrando, y a quién no?"],
                  ["Sesgo cultural del marco",
                   "El sistema nació con marcas norteamericanas de consumo masivo de fines de los noventa. Sus ejemplos y connotaciones no se leen igual en un mercado local, ni en marcas B2B o públicas."],
                  ["El arquetipo no reemplaza a la estrategia",
                   "Define personalidad y tono, no segmentación, propuesta de valor, precio ni canal. Una marca con arquetipo impecable y propuesta de valor débil sigue siendo una marca débil."],
                  ["Riesgo de estereotipo",
                   "Aplicado sin criterio produce comunicación previsible: todos los Héroes hablando de superación. El arquetipo fija la dirección; la ejecución tiene que ser tuya."],
                ].map(([t, d]) => (
                  <div key={t} className="pl-4" style={{ borderLeft: "3px solid #D2685C" }}>
                    <h3 className="font-serif font-bold text-slate-900 text-base">{t}</h3>
                    <p className="text-sm text-slate-600 mt-1">{d}</p>
                  </div>
                ))}
              </div>

              <p className="mt-5 text-sm text-slate-500 border-t border-slate-200 pt-4">
                Fuentes: Mark, M. &amp; Pearson, C. S. (2001), <em>The Hero and the Outlaw</em>, McGraw-Hill ·
                Jung, C. G., <em>The Archetypes and the Collective Unconscious</em> (CW 9i) ·
                Pearson, C. S. (1991), <em>Awakening the Heroes Within</em> ·
                Iconic Fox, <em>Brand Archetypes: The Definitive Guide</em>.
                <br />
                Material docente de{" "}
                <a href="https://patriciocastro.cl" target="_blank" rel="noopener"
                   className="underline" style={{ color: "#8A6508" }}>Patricio Castro</a>{" "}
                · Universidad Adolfo Ibáñez ·{" "}
                <a href="index.html" className="underline" style={{ color: "#8A6508" }}>
                  Más sobre este proyecto
                </a>
              </p>
            </div>
          </div>
        </StepShell>
      );
    }

    /* =========================================================
       App — estado global y wizard (Doc 2 §2)
       ========================================================= */
    function App() {
      const [state, setState] = useState({
        step: 0,
        brandName: "",
        company: { queHace: "", paraQuien: "", diferencia: "", percepcion: "" },
        answers: Array(QUESTIONS.length).fill(null),
        scores: null,
        result: { primary: null, secondary: null },
        revealed: false,
        voice: { message1: "", message2: "", message3: "", tagline: "" },
      });

      const goTo = (step) =>
        setState((s) => ({ ...s, step: Math.max(0, Math.min(STEPS.length - 1, step)) }));

      const setBrandName = (v) => setState((s) => ({ ...s, brandName: v }));
      const setCompany = (key, v) =>
        setState((s) => ({ ...s, company: { ...s.company, [key]: v } }));
      const setRevealed = () => setState((s) => ({ ...s, revealed: true }));
      const setAnswer = (qIdx, optIdx) =>
        setState((s) => {
          const answers = s.answers.slice();
          answers[qIdx] = optIdx;
          return { ...s, answers };
        });

      const allAnswered = state.answers.every((a) => a !== null);

      /* Al salir del test: calcular scoring y resultado (Doc 2 §6) */
      const handleNext = () => {
        if (state.step === 2) {
          const scores = scoring(state.answers);
          setState((s) => ({
            ...s,
            scores,
            result: { primary: scores.ranking[0].id, secondary: scores.ranking[1].id },
            revealed: false,
            step: 3,
          }));
        } else {
          goTo(state.step + 1);
        }
      };

      const setVoice = (key, v) =>
        setState((s) => ({ ...s, voice: { ...s.voice, [key]: v } }));

      /* Empezar de nuevo: estado inicial completo */
      const restart = () =>
        setState({
          step: 0,
          brandName: "",
          company: { queHace: "", paraQuien: "", diferencia: "", percepcion: "" },
          answers: Array(QUESTIONS.length).fill(null),
          scores: null,
          result: { primary: null, secondary: null },
          revealed: false,
          voice: { message1: "", message2: "", message3: "", tagline: "" },
        });

      /* Rehacer test (HU-11): limpia respuestas y resultado */
      const redoTest = () =>
        setState((s) => ({
          ...s,
          answers: Array(QUESTIONS.length).fill(null),
          scores: null,
          result: { primary: null, secondary: null },
          revealed: false,
          step: 2,
        }));

      const stepComponents = [
        <StepIntro key="intro" />,
        <StepCompany key="company" brandName={state.brandName} onBrandName={setBrandName}
                     company={state.company} onChange={setCompany} />,
        <StepTest key="test" answers={state.answers} onAnswer={setAnswer} brandName={state.brandName} />,
        <StepResult key="result" scores={state.scores} result={state.result} brandName={state.brandName}
                    onRedo={redoTest} revealed={state.revealed} onRevealed={setRevealed} />,
        <StepVoice key="voice" voice={state.voice} onChange={setVoice} result={state.result}
                   scores={state.scores} brandName={state.brandName} company={state.company} onRestart={restart} />,
      ];

      /* No avanza del test sin responder todo (HU-05) ni de "Tu empresa" sin nombre */
      const nextDisabled =
        (state.step === 1 && !state.brandName.trim()) ||
        (state.step === 2 && !allAnswered);
      const nextLabel =
        state.step === 0 ? "Comenzar →"
        : state.step === 1 ? "Ir al test →"
        : state.step === 2 ? "Ver mi resultado →"
        : state.step === 3 ? "Construir mi voz de marca →"
        : undefined;

      return (
        <div className="min-h-screen flex flex-col">
          <ProgressBar step={state.step} />
          <main className="flex-1">{stepComponents[state.step]}</main>
          <div className="px-4 pb-10">
            <Nav
              step={state.step}
              onBack={() => goTo(state.step - 1)}
              onNext={handleNext}
              nextLabel={nextLabel}
              nextDisabled={nextDisabled}
            />
          </div>
          <footer className="max-w-3xl mx-auto text-xs text-slate-500 pb-8 px-4">
            <p className="font-semibold text-slate-600 uppercase tracking-wide text-[11px]">Fuentes</p>
            <ul className="mt-1 space-y-0.5">
              <li>Mark, M. & Pearson, C. S. (2001). <em>The Hero and the Outlaw: Building Extraordinary Brands Through the Power of Archetypes</em>. McGraw-Hill. Ejes motivacionales: pp. 14–15; cuadrantes: índice pp. v–vi; <em>mottos</em> verificados por arquetipo.</li>
              <li>Iconic Fox. <em>Brand Archetypes: The Definitive Guide</em>. iconicfox.com.au/brand-archetypes (deseo central, estrategia de branding, industrias, marcas de referencia, tono de voz).</li>
            </ul>
            <p className="mt-3 pt-3 border-t border-slate-200 leading-relaxed">
              <span className="font-semibold text-slate-600">Licencia:</span> obra bajo{" "}
              <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.es" target="_blank" rel="noopener license" className="underline">CC BY-NC-SA 4.0</a>.
              Material docente de Patricio Castro, Universidad Adolfo Ib&aacute;&ntilde;ez. Uso educativo con atribuci&oacute;n.{" "}
              <a href="index.html" className="underline">Volver al inicio</a>
            </p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
